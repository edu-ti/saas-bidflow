name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bidflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, redis, mbstring, xml, curl
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: |
          cp .env.example .env
          php artisan key:generate
        working-directory: ./backend

      - name: Configure test environment
        run: |
          cd backend
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=bidflow_test" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env

      - name: Run migrations
        run: php artisan migrate --force
        working-directory: ./backend

      - name: Run tests
        run: php artisan test --parallel
        working-directory: ./backend

      - name: Run static analysis
        run: ./vendor/bin/phpstan analyse app --level=5
        working-directory: ./backend
        continue-on-error: true

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: TypeScript Check
        run: npx tsc --noEmit
        working-directory: ./frontend
        continue-on-error: true

      - name: Frontend Tests
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: ./frontend
        continue-on-error: true

      - name: Run linter
        run: npm run lint
        working-directory: ./frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: Build with env vars
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_MASTER_DOMAIN: master.test.com
          VITE_APP_DOMAIN: app.test.com
          VITE_API_URL: http://app.test.com/api

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist --optimize-autoloader
        continue-on-error: true

      - name: PHP Security Audit
        run: |
          cd backend
          composer audit
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
        continue-on-error: true

      - name: NPM Security Audit
        run: npm audit --audit-level=high
        working-directory: ./frontend
        continue-on-error: true