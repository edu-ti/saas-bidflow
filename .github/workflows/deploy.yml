name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: docker/php/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bidflow-app:latest
            ${{ secrets.DOCKER_USERNAME }}/bidflow-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push React image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: docker/react/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bidflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/bidflow
            docker compose pull
            docker compose up -d --no-deps --build app frontend worker cron
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            echo "Deploy concluído: $(date)"