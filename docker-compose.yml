services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: nginx:alpine
    container_name: bidflow_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:15
    container_name: bidflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bidflow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - bidflow_pgdata:/var/lib/postgresql/data
    # IMPORTANTE: Portas removidas para segurança em produção
    # Para acesso externo em desenvolvimento, descomente a linha abaixo:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-bidflow}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: bidflow_redis
    restart: unless-stopped
    # IMPORTANTE: Portas removidas para segurança em produção
    # Para acesso externo em desenvolvimento, descomente a linha abaixo:
    # ports:
    #   - "6379:6379"
    volumes:
      - bidflow_redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --timeout=90 --tries=3
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'queue:work' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  bidflow_pgdata:
  bidflow_redisdata:
