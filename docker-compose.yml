services:
  frontend:
    build:
      context: .
      dockerfile: docker/react/Dockerfile
    container_name: bidflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - bidflow_storage:/var/www/html/storage/app/public
    environment:
      - APP_NAME=GC\ Representações\ &\ Serviços
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-bidflow}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --timeout=90 --tries=3 --sleep=3
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-bidflow}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_cron
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "echo '*/1 * * * * cd /var/www/html && php artisan schedule:run >> /dev/null 2>&1' > /etc/crontabs/root &&
             crond -f -l 2"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-bidflow}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: bidflow_web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - bidflow_storage:/var/www/html/storage/app/public
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:15-alpine
    container_name: bidflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bidflow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - bidflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-bidflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bidflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - bidflow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rpa:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: bidflow_rpa
    restart: always
    working_dir: /app
    volumes:
      - ./bidflow_rpa_robot.py:/app/bidflow_rpa_robot.py
      - ./requirements.txt:/app/requirements.txt
      - bidflow_rpa_downloads:/app/downloads
    environment:
      - BIDFLOW_API_TOKEN=${BIDFLOW_API_TOKEN:-}
      - BIDFLOW_API_URL=${APP_URL:-http://localhost}/api
      - BIDFLOW_SEARCH_TERM=${BIDFLOW_SEARCH_TERM:-Material Hospitalar}
      - BIDFLOW_OPPORTUNITY_ID=${BIDFLOW_OPPORTUNITY_ID:-1}
      - BIDFLOW_HEADLESS=${BIDFLOW_HEADLESS:-true}
      - BIDFLOW_TIMEOUT=${BIDFLOW_TIMEOUT:-30}
      - BIDFLOW_DOWNLOAD_DIR=/app/downloads
      - BIDFLOW_MAX_RETRIES=${BIDFLOW_MAX_RETRIES:-3}
      - BIDFLOW_RETRY_DELAY=${BIDFLOW_RETRY_DELAY:-5}
    depends_on:
      - app

volumes:
  bidflow_pgdata:
  bidflow_redisdata:
  bidflow_storage:
  bidflow_rpa_downloads:

networks:
  default:
    name: bidflow_network