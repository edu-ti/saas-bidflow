version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: bidflow_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: bidflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bidflow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - bidflow_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: bidflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bidflow_redisdata:/data

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bidflow_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --timeout=90 --tries=3
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis

volumes:
  bidflow_pgdata:
  bidflow_redisdata:
